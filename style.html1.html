<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    background:#f5f5f5;
}

.form-container {
    max-width: 400px;
    margin: 80px auto 20px;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.form-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-container input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing:border-box;
}

.form-container button {
    width: 100%;
    padding: 10px;
    background: #6f4e37;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.form-container button:hover {
    background: #3e2723;
}

#orders{
    max-width:400px;
    margin:20px auto;
}

.order-card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.delete-btn{
    background:#c62828;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

.delete-btn:hover{
    background:#8e0000;
}
</style>
</head>

<body>

<div class="form-container">
    <h2>Order Your Coffee</h2>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="location" placeholder="Your Location">
    <input type="text" id="coffee" placeholder="Coffee Name">
    <input type="number" id="quantity" placeholder="Quantity" min="1">

    <button onclick="addOrder()">Place Order</button>
</div>

<div id="orders">
    <h2 style="text-align:center;">Orders List</h2>
</div>

<script>
function addOrder(){

    let name = document.getElementById("name").value;
    let location = document.getElementById("location").value;
    let coffee = document.getElementById("coffee").value;
    let quantity = document.getElementById("quantity").value;

    let orderCard = `
    <div class="order-card">
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Location:</strong> ${location}</p>
        <p><strong>Coffee:</strong> ${coffee}</p>
        <p><strong>Quantity:</strong> ${quantity}</p>

        <button class="delete-btn" onclick="this.parentElement.remove()">
            Delete
        </button>
    </div>
    `;

    document.getElementById("orders").innerHTML += orderCard;

    // clear inputs
    document.getElementById("name").value = "";
    document.getElementById("location").value = "";
    document.getElementById("coffee").value = "";
    document.getElementById("quantity").value = "";
}
</script>

</body>
</html>
